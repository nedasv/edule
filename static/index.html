<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script src="/static/js/app.js"></script>

    <div class="data-upload">
        <div class="courses-card" id="coursesCard">
            <h3>Courses</h3>
            <input type="file" id="coursesFile" accept=".json">
            <p>Click or drag to upload</p>
            <div class="file-name" id="coursesFileName"></div>
        </div>

        <div class="rooms-card" id="roomsCard">
            <h3>Rooms</h3>
            <input type="file" id="roomsFile" accept=".json">
            <p>Click or drag to upload</p>
            <div class="file-name" id="roomsFileName"></div>
        </div>
    </div>

    <div class="btn-row">
        <button class="btn-generate" id="generateBtn">
            Generate
        </button>
    </div>
</body>
</html>
